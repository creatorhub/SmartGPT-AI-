<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>

body{
margin:0;
background:#1e1e1e;
color:white;
font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
height:100vh;
overflow:hidden;
}

/* TOP BAR */

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#1e1e1e;
z-index:500;
}

.menu{
font-size:22px;
cursor:pointer;
}

.title{
font-size:18px;
font-weight:500;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:300px;
height:100%;
background:#171717;
transition:0.3s;
z-index:1000;
display:flex;
flex-direction:column;
}

.sidebar.active{
left:0;
}

.sidebar-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
font-size:18px;
border-bottom:1px solid #2c2c2c;
}

.close{
cursor:pointer;
}

.sidebar-content{
flex:1;
overflow-y:auto;
padding:15px;
}

.search-box{
display:flex;
align-items:center;
background:#2a2a2a;
border-radius:8px;
padding:8px 10px;
margin-bottom:15px;
}

.search-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:14px;
}

.search-icon{
margin-right:8px;
opacity:0.7;
}

.sidebar-item{
padding:10px;
border-radius:8px;
cursor:pointer;
color:#ddd;
margin-bottom:6px;
}

.sidebar-item:hover{
background:#2a2a2a;
}

/* PROFILE */

.sidebar-profile{
display:flex;
align-items:center;
padding:15px;
border-top:1px solid #2c2c2c;
cursor:pointer;
background:#171717;
}

.sidebar-profile:hover{
background:#2a2a2a;
}

.profile-img{
width:32px;
height:32px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
}

.profile-name{
font-size:14px;
color:#ddd;
}

/* CENTER */

.center{
position:absolute;
top:55px;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow-y:auto;
}

/* INPUT */

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:15px;
background:#1e1e1e;
display:flex;
justify-content:center;
}

.input-wrapper{
width:95%;
max-width:650px;
display:flex;
align-items:center;
background:#2a2a2a;
border-radius:35px;
padding:10px 15px;
}

.plus{
font-size:20px;
margin-right:10px;
cursor:pointer;
opacity:0.7;
}

.input-wrapper input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
}

.send{
background:#3a3a3a;
border:none;
color:white;
width:38px;
height:38px;
border-radius:50%;
margin-left:8px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- Sidebar -->

<div id="sidebar" class="sidebar">

<div class="sidebar-header">
<div>SmartGPT</div>
<div class="close" onclick="toggleMenu()">✕</div>
</div>

<div class="sidebar-content">

<div class="search-box">
<div class="search-icon">🔍</div>
<input placeholder="Search chats">
</div>

<div class="sidebar-item">➕ New chat</div>
<div class="sidebar-item">💡 Ideas</div>
<div class="sidebar-item">📊 Analysis</div>

</div>

<div class="sidebar-profile" onclick="openSettings()">
<img id="sidebarProfileImg" src="https://i.pravatar.cc/40" class="profile-img">
<div id="sidebarProfileName" class="profile-name">Your Name</div>
</div>

</div>

<!-- Top -->

<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div class="title">SmartGPT</div>
<div></div>
</div>

<!-- Center -->

<div class="center">
<h1>What can I help with?</h1>
</div>

<!-- Input -->

<div class="bottom">
<div class="input-wrapper">
<div class="plus">+</div>
<input id="chatInput" placeholder="Ask anything">
<button class="send">⬆</button>
</div>
</div>

<script>

/* Sidebar */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function openSettings(){
window.location.href="settings.html";
}

/* Load Profile */
window.onload = function(){

let savedName = localStorage.getItem("profileName");
let savedImage = localStorage.getItem("profileImage");

if(savedName){
document.getElementById("sidebarProfileName").innerText = savedName;
}

if(savedImage){
document.getElementById("sidebarProfileImg").src = savedImage;
}

}

/* ===========================
   GUEST LIMIT SYSTEM
=========================== */

document.querySelector(".send").addEventListener("click", function(){

let isLoggedIn = localStorage.getItem("loggedIn");

if(isLoggedIn !== "true"){

let count = localStorage.getItem("guestMessages");
count = count ? parseInt(count) : 0;

count++;
localStorage.setItem("guestMessages", count);

if(count > 5){
alert("Free limit reached. Please login.");
window.location.href="login.html";
return;
}

}

alert("Message sent (Demo)");

});

</script>

</body>
</html>
