<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>
body{
margin:0;
background:#1e1e1e;
color:white;
font-family:system-ui;
height:100vh;
overflow:hidden;
}

/* TOP BAR */
.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#1e1e1e;
z-index:500;
}

.menu{font-size:22px;cursor:pointer;}
.title{font-size:18px;font-weight:500;}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-320px;
width:300px;
height:100%;
background:#171717;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}
.sidebar.active{left:0;}
.sidebar-header{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid #2c2c2c;
}
.sidebar-content{flex:1;overflow:auto;padding:15px;}
.sidebar-profile{
display:flex;
align-items:center;
padding:15px;
border-top:1px solid #2c2c2c;
cursor:pointer;
}
.profile-img{
width:32px;height:32px;border-radius:50%;margin-right:10px;
}

/* CHAT AREA */
.chat-container{
position:absolute;
top:55px;
bottom:90px;
left:0;
right:0;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:15px;
max-width:80%;
padding:10px 15px;
border-radius:15px;
line-height:1.4;
}

.user{
background:#10a37f;
align-self:flex-end;
margin-left:auto;
}

.bot{
background:#2a2a2a;
}

/* INPUT */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:15px;
background:#1e1e1e;
display:flex;
justify-content:center;
}

.input-wrapper{
width:95%;
max-width:650px;
display:flex;
align-items:center;
background:#2a2a2a;
border-radius:35px;
padding:10px 15px;
}

.input-wrapper input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
}

.send{
background:#3a3a3a;
border:none;
color:white;
width:38px;
height:38px;
border-radius:50%;
margin-left:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
<div class="sidebar-header">
<div>SmartGPT</div>
<div onclick="toggleMenu()">✕</div>
</div>
<div class="sidebar-content"></div>
<div class="sidebar-profile">
<img id="sidebarProfileImg" src="https://i.pravatar.cc/40" class="profile-img">
<div id="sidebarProfileName">User</div>
</div>
</div>

<div class="topbar">
<div class="menu" onclick="toggleMenu()">☰</div>
<div class="title">SmartGPT</div>
<div></div>
</div>

<div id="chat" class="chat-container"></div>

<div class="bottom">
<div class="input-wrapper">
<input id="chatInput" placeholder="Ask anything">
<button class="send" onclick="sendMessage()">⬆</button>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxblCbzuvE8n8dOwfVo-hPlyQIo2fnTMqD_QahkDbhapGA0QV8dl6j5njUq_-X2BH0MYg/exec";

/* Sidebar */
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

/* Load Profile */
window.onload = function(){
let name = localStorage.getItem("profileName");
let img = localStorage.getItem("profileImage");
if(name) document.getElementById("sidebarProfileName").innerText = name;
if(img) document.getElementById("sidebarProfileImg").src = img;
}

/* Enter key */
document.getElementById("chatInput").addEventListener("keypress", function(e){
if(e.key === "Enter") sendMessage();
});

/* Add message to UI */
function addMessage(text, type){
let div = document.createElement("div");
div.className = "message " + type;
div.innerText = text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

/* Send Message */
async function sendMessage(){

let input = document.getElementById("chatInput");
let message = input.value.trim();
if(!message) return;

let userId = localStorage.getItem("userId");
let isLoggedIn = localStorage.getItem("loggedIn");

/* Guest limit */
if(isLoggedIn !== "true"){
let count = localStorage.getItem("guestMessages");
count = count ? parseInt(count) : 0;
count++;
localStorage.setItem("guestMessages", count);

if(count > 5){
alert("Free limit reached. Please login.");
window.location.href="login.html";
return;
}
}

addMessage(message,"user");
input.value = "";

addMessage("Thinking...","bot");

try{
let response = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
action:"chat",
ai:"openai",
userId:userId || "guest",
message:message
})
});

let result = await response.json();

document.querySelector(".bot:last-child").remove();
addMessage(result.reply || "Error","bot");

}catch(err){
document.querySelector(".bot:last-child").remove();
addMessage("Server error","bot");
}

}

</script>

</body>
</html>
