<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>
body{
margin:0;
background:#1e1e1e;
color:white;
font-family:system-ui;
height:100vh;
overflow:hidden;
}

/* TOP BAR */
.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#1e1e1e;
z-index:500;
border-bottom:1px solid #2a2a2a;
}

.menu{font-size:22px;cursor:pointer;}
.title{font-size:18px;font-weight:500;}

/* CHAT AREA */
.chat-container{
position:absolute;
top:55px;
bottom:90px;
left:0;
right:0;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.message{
margin-bottom:15px;
max-width:80%;
padding:12px 16px;
border-radius:18px;
line-height:1.4;
word-wrap:break-word;
font-size:15px;
}

.user{
background:#10a37f;
align-self:flex-end;
}

.bot{
background:#2a2a2a;
align-self:flex-start;
}

/* INPUT */
.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
padding:15px;
background:#1e1e1e;
border-top:1px solid #2a2a2a;
display:flex;
justify-content:center;
}

.input-wrapper{
width:95%;
max-width:700px;
display:flex;
align-items:center;
background:#2a2a2a;
border-radius:35px;
padding:10px 15px;
}

.input-wrapper input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
}

.send{
background:#10a37f;
border:none;
color:white;
width:40px;
height:40px;
border-radius:50%;
margin-left:8px;
cursor:pointer;
font-size:16px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu">☰</div>
<div class="title">SmartGPT</div>
<div></div>
</div>

<div id="chat" class="chat-container"></div>

<div class="bottom">
<div class="input-wrapper">
<input id="chatInput" placeholder="Ask anything">
<button class="send" onclick="sendMessage()">⬆</button>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxblCbzuvE8n8dOwfVo-hPlyQIo2fnTMqD_QahkDbhapGA0QV8dl6j5njUq_-X2BH0MYg/exec";

/* Enter key */
document.getElementById("chatInput").addEventListener("keydown", function(e){
if(e.key === "Enter") sendMessage();
});

/* Add message */
function addMessage(text, type){
let div = document.createElement("div");
div.className = "message " + type;
div.innerText = text;
document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

/* Send message */
async function sendMessage(){

let input = document.getElementById("chatInput");
let message = input.value.trim();
if(!message) return;

addMessage(message,"user");
input.value = "";

let loading = document.createElement("div");
loading.className = "message bot";
loading.innerText = "Thinking...";
document.getElementById("chat").appendChild(loading);

try{

let response = await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body: JSON.stringify({
action:"chat",
ai:"openai",
message:message
})
});

/* Safe response parsing */
let text = await response.text();
let result;

try{
result = JSON.parse(text);
}catch{
result = {success:false};
}

loading.remove();

if(result.success && result.reply){
addMessage(result.reply,"bot");
}else{
addMessage("AI response error ❌","bot");
}

}catch(error){
loading.remove();
addMessage("Server error ❌","bot");
}

}

</script>

</body>
</html>
