<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT AI</title>

<style>

body{
margin:0;
background:#0b0f19;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* HEADER */

.header{
height:55px;
display:flex;
align-items:center;
padding-left:15px;
}

.menu{
font-size:26px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:#111827;
padding:20px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar h3{
margin-top:40px;
}

.sidebar div{
margin-top:15px;
cursor:pointer;
}

/* MAIN SCROLL AREA */

.main{
flex:1;
overflow-y:auto;
}

/* Center Section */

.center{
min-height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.center h1{
font-size:28px;
font-weight:500;
margin-bottom:40px;
}

/* Suggestions */

.suggestions{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:500px;
width:100%;
}

.suggestions div{
border:1px solid #2a2f3a;
padding:14px;
border-radius:30px;
cursor:pointer;
transition:0.2s;
background:#111827;
}

.suggestions div:hover{
background:#1f2937;
}

/* Bottom Input */

.bottom{
padding:12px;
background:#0b0f19;
}

.input-box{
width:95%;
max-width:700px;
margin:auto;
display:flex;
align-items:center;
background:#111827;
border:1px solid #2a2f3a;
border-radius:30px;
padding:8px 12px;
gap:8px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:16px;
}

.icon-btn{
background:transparent;
border:none;
color:#9ca3af;
font-size:18px;
cursor:pointer;
}

.icon-btn:hover{
color:white;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div id="sidebar" class="sidebar">
<h3>SmartGPT AI</h3>
<div onclick="location.href='index.html'">🏠 Home</div>
<div onclick="location.href='brainstorm.html'">💡 Brainstorm</div>
<div onclick="location.href='image.html'">🎨 Create Image</div>
<div onclick="location.href='analyze.html'">📊 Analyze</div>
<div onclick="location.href='advice.html'">🎓 Advice</div>
</div>

<!-- Header -->

<div class="header">
<div class="menu" onclick="toggleMenu()">☰</div>
</div>

<!-- Scroll Main -->

<div class="main">
<div class="center">

<h1>What can I help with?</h1>

<div class="suggestions">
<div onclick="location.href='image.html'">🎨 Create image</div>
<div onclick="location.href='analyze.html'">📊 Analyze data</div>
<div onclick="location.href='advice.html'">🎓 Get advice</div>
<div onclick="location.href='brainstorm.html'">💡 Make a plan</div>
</div>

</div>
</div>

<!-- Bottom Input -->

<div class="bottom">
<div class="input-box">

<!-- File Upload -->
<label class="icon-btn">
➕
<input type="file" hidden onchange="handleFile(this)">
</label>

<!-- Text Input -->
<input id="chatInput" placeholder="Ask SmartGPT..." onkeydown="checkEnter(event)">

<!-- Mic -->
<button class="icon-btn">🎤</button>

<!-- Send -->
<button class="icon-btn" onclick="sendMessage()">⬆</button>

</div>
</div>

<script>

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

/* File Upload */
function handleFile(input){
if(input.files.length>0){
alert("Selected: " + input.files[0].name);
}
}

/* Enter Press */
function checkEnter(e){
if(e.key==="Enter"){
sendMessage();
}
}

/* Send */
function sendMessage(){
let input=document.getElementById("chatInput");
if(input.value.trim()=="") return;
alert("Message: " + input.value);
input.value="";
}

</script>

</body>
</html>
