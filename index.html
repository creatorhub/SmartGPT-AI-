<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGPT</title>

<style>

body{
margin:0;
background:#1e1e1e;
color:white;
font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */

.topbar{
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#1e1e1e;
}

.menu{
font-size:22px;
cursor:pointer;
}

.title{
font-size:18px;
font-weight:500;
}

/* CENTER */

.center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.center h1{
font-weight:400;
font-size:26px;
color:#e5e5e5;
}

/* BOTTOM INPUT */

.bottom{
padding:15px;
display:flex;
justify-content:center;
}

.input-wrapper{
width:95%;
max-width:650px;
display:flex;
align-items:center;
background:#2a2a2a;
border-radius:35px;
padding:10px 15px;
box-shadow:0 0 0 1px #333;
}

.plus{
font-size:20px;
margin-right:10px;
cursor:pointer;
opacity:0.7;
}

.plus:hover{
opacity:1;
}

.input-wrapper input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:16px;
}

.mic, .send{
background:#3a3a3a;
border:none;
color:white;
width:38px;
height:38px;
border-radius:50%;
margin-left:8px;
cursor:pointer;
}

.mic:hover, .send:hover{
background:#4a4a4a;
}

</style>
</head>

<body>

<!-- Top Bar -->

<div class="topbar">
<div class="menu">☰</div>
<div class="title">SmartGPT</div>
<div></div>
</div>

<!-- Center Text -->

<div class="center">
<h1>What can I help with?</h1>
</div>

<!-- Bottom Input -->

<div class="bottom">
<div class="input-wrapper">

<div class="plus">+</div>

<input placeholder="Ask anything">

<button class="mic">🎤</button>
<button class="send">⬆</button>

</div>
</div>

</body>
</html>
