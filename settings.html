<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - SmartGPT</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Top Bar */

.topbar{
display:flex;
align-items:center;
padding:15px;
font-size:20px;
font-weight:500;
}

.back{
font-size:22px;
margin-right:15px;
cursor:pointer;
}

/* Profile Top Section */

.profile-section{
text-align:center;
margin-top:10px;
margin-bottom:20px;
}

.profile-section img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.profile-section input{
display:none;
}

.profile-name{
margin-top:10px;
font-size:18px;
}

/* Container */

.container{
padding:15px;
}

.section-title{
margin-top:25px;
margin-bottom:10px;
color:#aaa;
font-size:14px;
}

/* Setting Card */

.setting-card{
background:#2a2a2a;
padding:18px;
border-radius:22px;
margin-bottom:14px;
display:flex;
align-items:center;
cursor:pointer;
}

.setting-card:hover{
background:#333;
}

.setting-card span{
font-size:16px;
}

/* Logout */

.logout{
background:#2a2a2a;
padding:18px;
border-radius:22px;
margin-top:25px;
color:#ff4d4d;
cursor:pointer;
}

.logout:hover{
background:#333;
}

</style>
</head>
<body>

<div class="topbar">
<div class="back" onclick="goBack()">←</div>
<div>Settings</div>
</div>

<!-- Profile Image Section -->

<div class="profile-section">
<label for="uploadImage">
<img id="profileImage" src="https://i.pravatar.cc/150">
</label>
<input type="file" id="uploadImage" onchange="changeImage(event)">
<div class="profile-name" id="profileName">Your Name</div>
</div>

<div class="container">

<div class="section-title">Account</div>

<div class="setting-card" onclick="openPage('profile.html')">
<span>👤 Profile</span>
</div>

<div class="setting-card" onclick="openPage('email.html')">
<span>📧 Email</span>
</div>

<div class="setting-card" onclick="openPage('appearance.html')">
<span>🎨 Appearance</span>
</div>

<div class="setting-card" onclick="openPage('notifications.html')">
<span>🔔 Notifications</span>
</div>

<div class="setting-card" onclick="openPage('security.html')">
<span>🔒 Security</span>
</div>

<div class="setting-card" onclick="openPage('about.html')">
<span>ℹ About</span>
</div>

<div class="logout" onclick="logout()">
🚪 Log out
</div>

</div>

<script>

function goBack(){
window.location.href="index.html";
}

function openPage(page){
window.location.href = page;
}

/* Load saved profile */
window.onload = function(){
let name = localStorage.getItem("profileName");
let image = localStorage.getItem("profileImage");

if(name){
document.getElementById("profileName").innerText = name;
}

if(image){
document.getElementById("profileImage").src = image;
}
}

function changeImage(event){
let file = event.target.files[0];
if(file){
let reader = new FileReader();
reader.onload = function(e){
localStorage.setItem("profileImage", e.target.result);
document.getElementById("profileImage").src = e.target.result;
}
reader.readAsDataURL(file);
}
}

function logout(){
alert("Logged out!");
}

</script>

</body>
</html>
