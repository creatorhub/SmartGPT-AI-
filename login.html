<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SmartGPT</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#10a37f;
color:white;
font-size:16px;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
color:#aaa;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="goRegister()">Don't have account? Register</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxblCbzuvE8n8dOwfVo-hPlyQIo2fnTMqD_QahkDbhapGA0QV8dl6j5njUq_-X2BH0MYg/exec";

if(localStorage.getItem("loggedIn") === "true"){
  window.location.href = "index.html";
}

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please fill all fields");
    return;
  }

  const userId = email.toLowerCase().replace(/[^a-z0-9]/g,"_");

  try{

    const response = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"text/plain"   // ✅ CORS FIX
      },
      body: JSON.stringify({
        action:"login",
        userId:userId,
        password:password
      })
    });

    const result = await response.json();

    if(result.success){

      localStorage.setItem("loggedIn","true");
      localStorage.setItem("userId", userId);
      localStorage.setItem("profileName", result.user?.name || "");
      localStorage.setItem("profileEmail", result.user?.email || "");

      alert("Backend Connected ✅");

      window.location.href="index.html";

    }else{
      alert(result.message || "Login failed");
    }

  }catch(error){
    console.error(error);
    alert("Server connection error ❌");
  }

}

function goRegister(){
  window.location.href="register.html";
}

</script>

</body>
</html>
