<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SmartGPT</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#10a37f;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
color:#aaa;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<h2>Register</h2>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<div class="switch" onclick="goLogin()">Already have account? Login</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxblCbzuvE8n8dOwfVo-hPlyQIo2fnTMqD_QahkDbhapGA0QV8dl6j5njUq_-X2BH0MYg/exec";

/* Redirect if already logged in */
if(localStorage.getItem("loggedIn") === "true"){
  window.location.href = "index.html";
}

async function register(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!name || !email || !password){
    alert("Please fill all fields");
    return;
  }

  const userId = email.toLowerCase().replace(/[^a-z0-9]/g,"_");

  try{

    const response = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        action:"register",
        userId:userId,
        name:name,
        email:email,
        password:password
      })
    });

    // Agar server 200 return nahi karta
    if(!response.ok){
      throw new Error("HTTP error " + response.status);
    }

    const result = await response.json();

    if(result.success){

      localStorage.setItem("loggedIn","true");
      localStorage.setItem("userId", userId);
      localStorage.setItem("profileName", name);
      localStorage.setItem("profileEmail", email);

      alert("Registration successful ✅");

      window.location.href="index.html";

    }else{
      alert(result.message || "Registration failed");
    }

  }catch(error){
    console.error(error);
    alert("Server connection error ❌\n\nCheck Apps Script deployment & CORS settings.");
  }

}

function goLogin(){
  window.location.href="login.html";
}

</script>

</body>
</html>
