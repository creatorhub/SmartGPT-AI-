<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - SmartGPT</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:system-ui;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:350px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#10a37f;
color:white;
font-size:16px;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
color:#aaa;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<h2>Register</h2>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>

<div class="switch" onclick="goLogin()">Already have account? Login</div>

</div>

<script>

function register(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

let user = {
name:name,
email:email,
password:password
};

localStorage.setItem("user", JSON.stringify(user));
localStorage.setItem("loggedIn", "true");
localStorage.setItem("profileName", name);

window.location.href="index.html";
}

function goLogin(){
window.location.href="login.html";
}

</script>

</body>
</html>
